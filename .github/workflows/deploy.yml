name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject shared API config from secrets
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          RAPID_API_KEY: ${{ secrets.RAPID_API_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import os, json
          keys = {
            'openaiApiKey':       os.environ.get('OPENAI_API_KEY', ''),
            'claudeApiKey':       os.environ.get('CLAUDE_API_KEY', ''),
            'tavilyApiKey':       os.environ.get('TAVILY_API_KEY', ''),
            'firecrawlApiKey':    os.environ.get('FIRECRAWL_API_KEY', ''),
            'rapidApiKey':        os.environ.get('RAPID_API_KEY', ''),
            'googlePlacesApiKey': os.environ.get('GOOGLE_PLACES_API_KEY', ''),
          }
          lines = [
            '/* Auto-generated by GitHub Actions — do not edit */',
            'window.PULSE_SHARED_CONFIG = {',
          ]
          for k, v in keys.items():
            lines.append(f'  {k}: {json.dumps(v)},')
          lines.append('};')
          with open('js/shared-config.js', 'w') as f:
            f.write('\n'.join(lines) + '\n')
          print('shared-config.js written successfully.')
          PYEOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
